<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - KIPS Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container nav-container">
      <div class="logo">KIPS Admin</div>
      <ul class="nav-links">
        <li><a href="index.html">View Site</a></li>
        <li><a href="#products" class="nav-tab active">Products</a></li>
        <li><a href="#orders" class="nav-tab">Orders</a></li>
        <li><a href="#users" class="nav-tab">Users</a></li>
      </ul>
    </div>
  </nav>

  <!-- Admin Dashboard -->
  <section class="section">
    <div class="container">
      <!-- Products Management -->
      <div id="productsTab" class="admin-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
          <h2>Products Management</h2>
          <button class="btn btn-primary" id="addProductBtn">
            <i class="fas fa-plus"></i> Add Product
          </button>
        </div>
        
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Image</th>
              <th>Name</th>
              <th>Price</th>
              <th>Category</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTable">
            <!-- Products loaded by JS -->
          </tbody>
        </table>
      </div>

      <!-- Orders Tab -->
      <div id="ordersTab" class="admin-section" style="display: none;">
        <h2>Recent Orders</h2>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Total</th>
              <th>Items</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="ordersTable">
            <!-- Orders loaded by JS -->
          </tbody>
        </table>
      </div>

      <!-- Users Tab -->
      <div id="usersTab" class="admin-section" style="display: none;">
        <h2>Users</h2>
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
            </tr>
          </thead>
          <tbody id="usersTable">
            <!-- Users loaded by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- Add/Edit Product Modal -->
  <div id="productModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;">
    <div class="card" style="width: 90%; max-width: 600px; padding: 2rem;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h3 id="modalTitle">Add Product</h3>
        <button id="closeModal" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">×</button>
      </div>
      <form id="productForm">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="productName" required>
        </div>
        <div class="form-group">
          <label>Price</label>
          <input type="number" id="productPrice" step="0.01" required>
        </div>
        <div class="form-group">
          <label>Original Price</label>
          <input type="number" id="productOriginalPrice" step="0.01">
        </div>
        <div class="form-group">
          <label>Discount (%)</label>
          <input type="number" id="productDiscount" min="0" max="100">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="productCategory" required>
            <option value="men">Men</option>
            <option value="women">Women</option>
            <option value="bags">Bags</option>
            <option value="shoes">Shoes</option>
            <option value="accessories">Accessories</option>
          </select>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="url" id="productImage" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="productDescription" rows="3"></textarea>
        </div>
        <input type="hidden" id="productId">
        <div style="display: flex; gap: 1rem;">
          <button type="submit" class="btn btn-primary">Save Product</button>
          <button type="button" class="btn btn-outline" id="cancelBtn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await loadAdminData();
      setupAdminEvents();
    });
  </script>
</body>
</html>
