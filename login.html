<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - KIPS Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container nav-container">
      <div class="logo">KIPS</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Shop</a></li>
        <li><a href="cart.html"><i class="fas fa-shopping-bag cart-icon" id="cartIcon"></i></a></li>
        <li><a href="signup.html">Sign Up</a></li>
      </ul>
    </div>
  </nav>

  <!-- Login Form -->
  <section class="section">
    <div class="container">
      <div class="grid grid-2">
        <div class="fade-in">
          <h2>Welcome Back</h2>
          <p class="text-secondary" style="color: var(--text-secondary);">Sign in to your account</p>
          
          <form id="loginForm" class="card" style="max-width: 400px; padding: 2rem;">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" required>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-full">Sign In</button>
          </form>
          
          <p style="text-align: center; margin-top: 1rem; color: var(--text-secondary);">
            Don't have an account? <a href="signup.html">Sign up here</a>
          </p>
        </div>
        <div style="background: linear-gradient(135deg, var(--primary), var(--accent)); padding: 3rem; border-radius: var(--radius); text-align: center;">
          <i class="fas fa-lock" style="font-size: 4rem; color: white; margin-bottom: 1rem;"></i>
          <h3>Secure Login</h3>
          <p style="color: rgba(255,255,255,0.9);">Your data is protected with enterprise-grade security</p>
        </div>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const response = await loginUser(email, password);
        alert('Login successful! Redirecting...');
        window.location.href = 'index.html';
      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>
